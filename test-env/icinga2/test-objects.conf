/*
 * Test objects for icinga-lighthouse.
 *
 * All services are PASSIVE (enable_active_checks = false) so the state we push
 * via the API with process-check-result sticks until we change it again — this
 * makes the alarm/threshold/filter behaviour deterministic.
 *
 * Service matrix (see scripts/seed.sh):
 *   svc-crit  -> set CRITICAL, no handling      => MUST trigger the siren
 *   svc-ack   -> CRITICAL + acknowledged        => must be IGNORED
 *   svc-dt    -> CRITICAL + in downtime         => must be IGNORED
 *   svc-flap  -> CRITICAL + flapping            => must be IGNORED
 *   svc-ok    -> OK                             => never triggers
 */

object Host "test-host" {
  check_command        = "dummy"
  enable_active_checks = false
  enable_flapping      = false
  vars.dummy_state     = 0
  vars.dummy_text      = "test-host is up"
  address              = "127.0.0.1"
}

object Service "svc-crit" {
  host_name            = "test-host"
  check_command        = "dummy"
  enable_active_checks = false
  enable_flapping      = false
  vars.dummy_state     = 0
}

object Service "svc-ack" {
  host_name            = "test-host"
  check_command        = "dummy"
  enable_active_checks = false
  enable_flapping      = false
  vars.dummy_state     = 0
}

object Service "svc-dt" {
  host_name            = "test-host"
  check_command        = "dummy"
  enable_active_checks = false
  enable_flapping      = false
  vars.dummy_state     = 0
}

object Service "svc-flap" {
  host_name            = "test-host"
  check_command        = "dummy"
  enable_active_checks = false
  enable_flapping      = true
  flapping_threshold_high = 30
  flapping_threshold_low  = 25
  vars.dummy_state     = 0
}

object Service "svc-ok" {
  host_name            = "test-host"
  check_command        = "dummy"
  enable_active_checks = false
  enable_flapping      = false
  vars.dummy_state     = 0
}
